# Despliegue de beta en el VPS-2. Solo `web` se publica en 127.0.0.1:3100
# (nginx del host es la única fachada en 80/443). db y minio quedan en la red
# interna, sin exponer a internet. Variables reales en /opt/greensol/.env.
services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file: .env
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}?schema=public
      S3_ENDPOINT: http://minio:9000
      S3_BUCKET: ${S3_BUCKET:-greensol-kyc}
      S3_ACCESS_KEY: ${MINIO_ROOT_USER}
      S3_SECRET_KEY: ${MINIO_ROOT_PASSWORD}
      S3_FORCE_PATH_STYLE: "true"
      S3_REGION: us-east-1
    depends_on:
      db:
        condition: service_healthy
      minio:
        condition: service_started
    ports:
      - "127.0.0.1:3100:3000"
    networks:
      - greensol_net

  db:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - greensol_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - greensol_net

  minio:
    image: quay.io/minio/minio:latest
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    volumes:
      - greensol_minio:/data
    networks:
      - greensol_net

volumes:
  greensol_pgdata:
  greensol_minio:

networks:
  greensol_net:
